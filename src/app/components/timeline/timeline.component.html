<div class="relative w-1/2 m-8">
  <div
    class="border-r-2 border-gray-200 border-dotted absolute h-full top-0 z-0"
    style="left: 7px"
  ></div>
  <ul class="list-none m-0 p-0">
    <li class="mb-2" *ngFor="let element of elements">
      <div class="flex items-center mb-1">
        <div
          class="bg-teal-500 rounded-full h-4 w-4 border-gray-200 border-2 z-10"
        ></div>
        <div class="ml-4 p-8 mt-3 mb-3 bg-white rounded-lg shadow-md">
          <span class="text-lg font-medium leading-6 text-gray-900">
            {{ element.title }}
          </span>
          <br />
          <span class="font-medium leading-6 text-gray-400">
            {{ element.subtitle }}
          </span>
          <p class="mt-2 text-base leading-6 text-gray-600">
            {{ element.details }}
          </p>
        </div>
      </div>
    </li>
  </ul>
</div>
