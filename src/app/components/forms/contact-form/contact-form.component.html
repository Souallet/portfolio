<form class="w-full max-w-lg" (ngSubmit)="onSubmit()" [formGroup]="contactForm">
  <div class="flex flex-wrap -mx-3 mb-6">
    <div class="w-full md:w-1/2 px-3 mb-4">
      <label
        class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
        for="firstname"
      >
        Prénom
      </label>
      <input
        class="appearance-none block w-full bg-gray-200 text-gray-700 border rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500"
        [ngClass]="{
          'border-red-500':
            !contactForm.get('firstname').valid &&
            contactForm.get('firstname').touched
        }"
        id="firstname"
        name="firstname"
        formControlName="firstname"
        type="text"
        placeholder="Votre prénom"
      />
      <p
        class="text-red-500 text-xs italic"
        *ngIf="
          !contactForm.get('firstname').valid &&
          contactForm.get('firstname').touched
        "
      >
        Veuillez saisir un prénom valide.
      </p>
    </div>
    <div class="w-full md:w-1/2 px-3 mb-4">
      <label
        class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
        for="lastname"
      >
        Nom
      </label>
      <input
        class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500"
        [ngClass]="{
          'border-red-500':
            !contactForm.get('lastname').valid &&
            contactForm.get('lastname').touched
        }"
        id="lastname"
        name="lastname"
        formControlName="lastname"
        type="text"
        placeholder="Votre nom"
      />
      <p
        class="text-red-500 text-xs italic"
        *ngIf="
          !contactForm.get('lastname').valid &&
          contactForm.get('lastname').touched
        "
      >
        Veuillez saisir un nom valide.
      </p>
    </div>

    <div class="w-full px-3 mb-4">
      <label
        class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
        for="email"
      >
        E-mail
      </label>
      <input
        class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500"
        [ngClass]="{
          'border-red-500':
            !contactForm.get('email').valid && contactForm.get('email').touched
        }"
        id="email"
        name="email"
        formControlName="email"
        type="email"
        placeholder="exemple@domaine.fr"
      />
      <p
        class="text-red-500 text-xs italic"
        *ngIf="
          !contactForm.get('email').valid && contactForm.get('email').touched
        "
      >
        Veuillez saisir un email valide.
      </p>
    </div>

    <div class="w-full px-3 mb-4">
      <label
        class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
        for="enterprise"
      >
        Entreprise
      </label>
      <input
        class="appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500"
        id="enterprise"
        name="enterprise"
        formControlName="enterprise"
        type="text"
        placeholder="Mon entreprise"
      />
    </div>

    <div class="w-full px-3 mb-3">
      <label
        class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2"
        for="grid-password"
      >
        Message
      </label>
      <textarea
        class="resize-x appearance-none block w-full bg-gray-200 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-gray-500 h-48 resize-none"
        [ngClass]="{
          'border-red-500':
            !contactForm.get('message').valid &&
            contactForm.get('message').touched
        }"
        id="message"
        name="message"
        formControlName="message"
        minlength="15"
        placeholder="Votre message"
      ></textarea>
      <p
        class="text-red-500 text-xs italic"
        *ngIf="
          !contactForm.get('message').valid &&
          contactForm.get('message').touched
        "
      >
        Veuillez saisir un message de plus de 15 caractères.
      </p>
    </div>
  </div>
  <div class="md:flex md:items-center">
    <div class="md:w-1/3">
      <button
        class="shadow bg-teal-400 hover:bg-teal-400 focus:shadow-outline focus:outline-none text-white font-bold py-2 px-4 rounded"
        type="submit"
        [disabled]="submitted"
      >
        Envoyer
      </button>
    </div>
    <div class="md:w-2/3"></div>
  </div>
</form>
